<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCBrain</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0f0f0f;
    --surface: #1a1a1a;
    --border:  #2a2a2a;
    --text:    #e8e6e1;
    --sub:     #888780;
    --accent:  #1d9e75;
    --purple:  #7f77dd;
    --amber:   #ba7517;
    --radius:  8px;
    --mono:    'JetBrains Mono', 'Fira Code', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
         display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border);
             display: flex; flex-direction: column; padding: 16px 12px; flex-shrink: 0; }
  .logo { font-size: 18px; font-weight: 600; color: var(--accent); margin-bottom: 20px; padding: 4px 8px; }
  .nav-btn { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius);
             border: none; background: none; color: var(--sub); font-size: 13px; cursor: pointer;
             width: 100%; text-align: left; transition: all 0.15s; margin-bottom: 2px; }
  .nav-btn:hover, .nav-btn.active { background: var(--border); color: var(--text); }
  .sidebar-bottom { margin-top: auto; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Chat */
  #view-chat { display: flex; flex-direction: column; height: 100%; }
  .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border);
                 display: flex; align-items: center; justify-content: space-between; }
  .chat-header h2 { font-size: 15px; font-weight: 500; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; }
  .msg.user { background: var(--purple); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
  .msg.bot  { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 2px; }
  .msg.bot pre { background: #111; padding: 10px; border-radius: 4px; overflow-x: auto;
                 font-family: var(--mono); font-size: 12px; margin-top: 8px; }
  .msg-meta { font-size: 11px; color: var(--sub); margin-top: 4px; }
  .typing { display: flex; gap: 4px; padding: 12px 16px; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius); width: fit-content; align-self: flex-start; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--sub); animation: bounce 1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  .input-row { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
  .input-row textarea { flex: 1; background: var(--surface); border: 1px solid var(--border);
                        color: var(--text); padding: 10px 14px; border-radius: var(--radius);
                        font-size: 14px; resize: none; height: 44px; font-family: inherit; }
  .input-row textarea:focus { outline: none; border-color: var(--accent); }
  .send-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
              padding: 0 18px; font-size: 14px; cursor: pointer; font-weight: 500; transition: opacity 0.15s; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Modules view */
  #view-modules, #view-settings { display: none; padding: 24px; overflow-y: auto; }
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .module-card { background: var(--surface); border: 1px solid var(--border);
                 border-radius: var(--radius); padding: 16px; }
  .module-name { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .module-stage { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 10px; }
  .stage-bootstrap { background: #3a2a0a; color: var(--amber); }
  .stage-shadow    { background: #1e1b3a; color: var(--purple); }
  .stage-native    { background: #0a2a1e; color: var(--accent); }
  .progress-label  { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
  .progress-track  { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill   { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.4s; }
  .module-stats { display: flex; gap: 12px; font-size: 11px; color: var(--sub); }
  .add-module-btn { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius);
                    padding: 16px; cursor: pointer; color: var(--sub); font-size: 13px; text-align: center;
                    transition: all 0.15s; }
  .add-module-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Settings */
  .setting-row { display: flex; justify-content: space-between; align-items: center;
                 padding: 12px 0; border-bottom: 1px solid var(--border); }
  .setting-info { flex: 1; }
  .setting-label { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .setting-desc  { font-size: 11px; color: var(--sub); }
  .toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--border);
            cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
                   background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(16px); }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
              z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
           padding: 24px; width: 460px; max-width: 95vw; }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .form-row { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--sub); margin-bottom: 4px; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border);
                color: var(--text); padding: 8px 12px; border-radius: var(--radius);
                font-size: 13px; }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--sub);
                padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
  .btn-create { background: var(--accent); color: #fff; border: none; padding: 8px 16px;
                border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 500; }
  .scrollbar-thin::-webkit-scrollbar { width: 4px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">⚙ OCBrain</div>
  <button class="nav-btn active" onclick="showView('chat', this)">💬 Chat</button>
  <button class="nav-btn" onclick="showView('modules', this)">🧩 Modules</button>
  <button class="nav-btn" onclick="showView('settings', this)">⚙ Settings</button>
  <div class="sidebar-bottom">
    <div style="font-size:11px; color:var(--sub); padding:8px 10px;">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text" style="margin-left:6px;">connecting...</span>
    </div>
  </div>
</nav>

<div class="main">

  <!-- Chat view -->
  <div id="view-chat">
    <div class="chat-header">
      <h2>Chat</h2>
      <div id="active-modules" style="font-size:11px; color:var(--sub);"></div>
    </div>
    <div class="messages scrollbar-thin" id="messages"></div>
    <div class="input-row">
      <textarea id="query-input" placeholder="Ask anything..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuery()}"
        oninput="this.style.height='44px';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendQuery()">Send</button>
    </div>
  </div>

  <!-- Modules view -->
  <div id="view-modules">
    <div class="section-title">Expert Modules</div>
    <div class="module-grid" id="module-grid">
      <div style="color:var(--sub); font-size:13px;">Loading modules...</div>
    </div>
  </div>

  <!-- Settings view -->
  <div id="view-settings">
    <div class="section-title">Settings</div>
    <div id="settings-list"></div>
  </div>
</div>

<!-- New Module Modal -->
<div class="modal-bg" id="new-module-modal">
  <div class="modal">
    <h3>New Expert Module</h3>
    <div class="form-row">
      <div class="form-label">Module name</div>
      <input class="form-input" id="nm-name" placeholder="e.g. finance, medical...">
    </div>
    <div class="form-row">
      <div class="form-label">Description</div>
      <input class="form-input" id="nm-desc" placeholder="What does this module do?">
    </div>
    <div class="form-row">
      <div class="form-label">Bootstrap model</div>
      <select class="form-input" id="nm-model">
        <option value="mistral">mistral</option>
        <option value="codestral">codestral</option>
        <option value="llama3">llama3</option>
        <option value="gemma2">gemma2</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-label">Trigger keywords (comma-separated)</div>
      <input class="form-input" id="nm-keywords" placeholder="stock, market, invest...">
    </div>
    <div class="form-row">
      <div class="form-label">Source URLs (comma-separated)</div>
      <input class="form-input" id="nm-sources" placeholder="https://...">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-create" onclick="createModule()">Create Module</button>
    </div>
  </div>
</div>

<script>
const API = '';

// ── Status polling ────────────────────────────────────────────
async function pollStatus() {
  try {
    const r = await fetch(`${API}/status`);
    const d = await r.json();
    const dot  = document.getElementById('status-dot');
    const txt  = document.getElementById('status-text');
    if (d.status === 'ok') {
      dot.style.background = '#1d9e75';
      txt.textContent = `${Object.keys(d.modules||{}).length} modules`;
    }
  } catch { document.getElementById('status-dot').style.background = '#ba7517'; }
}
setInterval(pollStatus, 5000);
pollStatus();

// ── View switching ────────────────────────────────────────────
function showView(name, btn) {
  ['chat','modules','settings'].forEach(v => {
    document.getElementById(`view-${v}`).style.display = v === name
      ? (v === 'chat' ? 'flex' : 'block') : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'modules') loadModules();
  if (name === 'settings') loadSettings();
}

// ── Chat ──────────────────────────────────────────────────────
function addMessage(text, role, meta) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  // Render code blocks
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const rendered = escaped.replace(/```(\w*)\n?([\s\S]*?)```/g,
    (_,lang,code) => `<pre><code>${code.trim()}</code></pre>`);
  div.innerHTML = rendered;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'msg-meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

function showTyping() {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendQuery() {
  const input = document.getElementById('query-input');
  const query = input.value.trim();
  if (!query) return;

  addMessage(query, 'user');
  input.value = '';
  input.style.height = '44px';

  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const r = await fetch(`${API}/query`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ query }),
    });
    const d = await r.json();
    hideTyping();
    const meta = d.modules_used?.length ? `via: ${d.modules_used.join(', ')}` : '';
    addMessage(d.answer || 'No response.', 'bot', meta);
  } catch (e) {
    hideTyping();
    // Show a useful error — HTTP errors have empty .message, so include status
    const msg = e.message
      ? `Error: ${e.message}`
      : `Could not reach OCBrain. Is "python main.py" still running?`;
    addMessage(msg, 'bot');
  }
  document.getElementById('send-btn').disabled = false;
}

// ── Modules ───────────────────────────────────────────────────
async function loadModules() {
  try {
    const r = await fetch(`${API}/modules`);
    const modules = await r.json();
    const grid = document.getElementById('module-grid');
    grid.innerHTML = '';
    for (const [name, info] of Object.entries(modules)) {
      const score = Math.round((info.maturity_score||0) * 100);
      const stageClass = `stage-${info.stage||'bootstrap'}`;
      const card = document.createElement('div');
      card.className = 'module-card';
      card.innerHTML = `
        <div class="module-name">${name}</div>
        <div class="module-stage ${stageClass}">${info.stage||'bootstrap'}</div>
        <div class="progress-label">Maturity — ${score}%</div>
        <div class="progress-track"><div class="progress-fill" style="width:${score}%"></div></div>
        <div class="module-stats">
          <span>📦 ${info.kb_chunks||0} chunks</span>
          <span>🔄 ${info.query_count||0} queries</span>
        </div>
        <button onclick="trainModule('${name}')" style="margin-top:10px;background:none;border:1px solid var(--border);color:var(--sub);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;">▶ Train now</button>
      `;
      grid.appendChild(card);
    }
    const addBtn = document.createElement('div');
    addBtn.className = 'add-module-btn';
    addBtn.textContent = '+ Add custom module';
    addBtn.onclick = () => document.getElementById('new-module-modal').classList.add('open');
    grid.appendChild(addBtn);
  } catch (e) {
    document.getElementById('module-grid').innerHTML = `<div style="color:var(--sub)">${e.message}</div>`;
  }
}

async function trainModule(name) {
  if (!confirm(`Trigger training for '${name}'?`)) return;
  try {
    const r = await fetch(`${API}/train/${name}`, {method:'POST'});
    const d = await r.json();
    alert(d.result);
  } catch (e) { alert(e.message); }
}

// ── Settings ──────────────────────────────────────────────────
const SETTINGS_DEFS = [
  { key:'privacy.save_history',        label:'Save conversation history',  desc:'Store turns in context.sqlite' },
  { key:'privacy.save_training_pairs', label:'Collect training pairs',     desc:'Enable model learning from queries' },
  { key:'privacy.encrypt_context_db',  label:'Encrypt context database',   desc:'AES-256 encryption on local SQLite' },
  { key:'learning.training_enabled',   label:'Enable model training',      desc:'Master switch for all LoRA fine-tuning' },
  { key:'global.voice_enabled',        label:'Voice input',                desc:'Whisper STT via Ctrl+Shift+Space' },
];

async function loadSettings() {
  try {
    const r = await fetch(`${API}/config`);
    const cfg = await r.json();
    const list = document.getElementById('settings-list');
    list.innerHTML = '';
    for (const s of SETTINGS_DEFS) {
      const parts = s.key.split('.');
      let val = cfg;
      for (const p of parts) val = val?.[p];
      const enabled = Boolean(val);
      const row = document.createElement('div');
      row.className = 'setting-row';
      row.innerHTML = `
        <div class="setting-info">
          <div class="setting-label">${s.label}</div>
          <div class="setting-desc">${s.desc}</div>
        </div>
        <div class="toggle ${enabled ? 'on' : ''}" onclick="toggleSetting('${s.key}', this)"></div>
      `;
      list.appendChild(row);
    }
  } catch {}
}

async function toggleSetting(key, el) {
  el.classList.toggle('on');
  const val = el.classList.contains('on');
  try {
    await fetch(`${API}/config`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ [key]: val }),
    });
  } catch {}
}

// ── New module modal ──────────────────────────────────────────
function closeModal() {
  document.getElementById('new-module-modal').classList.remove('open');
}

async function createModule() {
  const name     = document.getElementById('nm-name').value.trim();
  const desc     = document.getElementById('nm-desc').value.trim();
  const model    = document.getElementById('nm-model').value;
  const kwStr    = document.getElementById('nm-keywords').value;
  const srcStr   = document.getElementById('nm-sources').value;
  const keywords = kwStr.split(',').map(s=>s.trim()).filter(Boolean);
  const sources  = srcStr.split(',').map(s=>s.trim()).filter(Boolean);
  if (!name || !desc) { alert('Name and description are required.'); return; }
  try {
    const r = await fetch(`${API}/modules/new`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, desc, model, keywords, sources }),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail); }
    closeModal();
    showView('modules', document.querySelectorAll('.nav-btn')[1]);
  } catch (e) { alert(`Error: ${e.message}`); }
}

document.getElementById('new-module-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
</body>
</html>
