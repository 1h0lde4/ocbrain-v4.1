name: OCBrain Auto Self-Improve

on:
  schedule:
    - cron: "0 2 * * *"   # daily at 02:00 UTC
  workflow_dispatch:

concurrency:
  group: ocbrain-autofix
  cancel-in-progress: true

jobs:

# =========================
# 1) AUDIT + PROPOSE PATCHES
# =========================
  audit_and_propose:
    runs-on: ubuntu-latest
    outputs:
      has_patches: ${{ steps.set_output.outputs.has_patches }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install -r requirements.txt || true

      - name: Run auditor (collect issues)
        run: |
          mkdir -p artifacts
          python - << 'PY'
          import json
          from core.self_improve.auditor import audit_repo
          issues = audit_repo(".")
          with open("artifacts/issues.json","w") as f:
              json.dump(issues, f, indent=2)
          print(f"Issues found: {len(issues)}")
          PY

      - name: Generate patch set (minimal diffs)
        run: |
          python - << 'PY'
          import json, os
          from core.self_improve.fixer import generate_fix

          issues = json.load(open("artifacts/issues.json"))
          patches = []
          for i, issue in enumerate(issues[:5]):  # safety cap
              fix = generate_fix(issue)
              if fix and fix.get("diff"):
                  patches.append(fix)

          os.makedirs("artifacts/patches", exist_ok=True)
          import json as j
          with open("artifacts/patches/patches.json","w") as f:
              j.dump(patches, f, indent=2)

          # write unified patch file
          with open("artifacts/patches/all.patch","w") as out:
              for p in patches:
                  out.write(p["diff"].rstrip() + "\n\n")
          print(f"Patches generated: {len(patches)}")
          PY

      - name: Check if patches exist
        id: set_output
        run: |
          if [ -s artifacts/patches/all.patch ]; then
            echo "has_patches=true" >> $GITHUB_OUTPUT
          else
            echo "has_patches=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-artifacts
          path: artifacts/

# =========================
# 2) APPLY PATCHES IN SANDBOX BRANCH
# =========================
  apply_in_sandbox:
    needs: audit_and_propose
    if: needs.audit_and_propose.outputs.has_patches == 'true'
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.vars.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create sandbox branch
        id: vars
        run: |
          BRANCH="ocbrain/autofix-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: audit-artifacts
          path: artifacts

      - name: Apply patch (reject on conflicts)
        run: |
          git apply --reject --whitespace=fix artifacts/patches/all.patch || true
          if git ls-files -o --exclude-standard | grep -q .; then
            echo "Untracked files created; continuing"
          fi

      - name: Commit changes
        run: |
          git config user.name "ocbrain-bot"
          git config user.email "bot@ocbrain.ai"
          git add -A
          git commit -m "OCBrain auto-fix (proposed patches)" || echo "No changes to commit"

      - name: Push branch
        run: |
          git push origin "${{ steps.vars.outputs.branch }}" || true

# =========================
# 3) VALIDATE (TESTS + EVALS + VERIFICATION)
# =========================
  validate:
    needs: apply_in_sandbox
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.set_output.outputs.passed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply_in_sandbox.outputs.branch_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install -r requirements.txt || true
          pip install pytest

      - name: Run unit tests
        run: pytest

      - name: Run evals
        run: python evals/run_eval.py

      - name: Run Phase 2 verification
        run: python tests/phase2_verification.py

      - name: Mark result
        id: set_output
        run: |
          echo "passed=true" >> $GITHUB_OUTPUT

# =========================
# 4) CREATE PR (NEVER AUTO-MERGE)
# =========================
  create_pr:
    needs: [apply_in_sandbox, validate]
    if: needs.validate.outputs.passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ needs.apply_in_sandbox.outputs.branch_name }}
          title: "🤖 OCBrain Auto Fix (Validated)"
          commit-message: "OCBrain auto-fix (validated)"
          body: |
            Automated fixes proposed by OCBrain.

            ✅ Passed:
            - Unit tests
            - Evals
            - Phase 2 verification

            📦 See attached artifacts for details.
          labels: auto-fix, validated

# =========================
# 5) REPORT (ALWAYS)
# =========================
  report:
    needs: [audit_and_propose, apply_in_sandbox, validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "Auto-fix pipeline completed"
          echo "Patches: ${{ needs.audit_and_propose.outputs.has_patches }}"
          echo "Validation passed: ${{ needs.validate.outputs.passed }}"
