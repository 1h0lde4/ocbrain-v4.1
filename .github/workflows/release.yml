name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: get
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

  build-linux:
    needs: version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install build deps
        run: |
          pip install pyinstaller --quiet
          pip install -r requirements.txt --quiet
          python -m spacy download en_core_web_sm --quiet
      - name: Write version
        run: echo "${{ needs.version.outputs.version }}" > version.txt
      - name: Build binary
        run: |
          pyinstaller --onefile --name ocbrain \
            --add-data "config:config" \
            --add-data "interface/web:interface/web" \
            main.py
      - name: Build .deb
        run: python install/build.py deb
      - name: Build pip sdist
        run: pip install build && python -m build --sdist
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/ocbrain
            dist/*.deb
            dist/*.tar.gz

  build-windows:
    needs: version
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Build
        run: |
          pip install pyinstaller --quiet
          pip install -r requirements.txt --quiet
          echo "${{ needs.version.outputs.version }}" > version.txt
          pyinstaller --onefile --name ocbrain --windowed `
            --add-data "config;config" `
            --add-data "interface/web;interface/web" main.py
          python install/build.py windows
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/ocbrain*.exe

  build-macos:
    needs: version
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Build
        run: |
          pip install pyinstaller --quiet
          pip install -r requirements.txt --quiet
          echo "${{ needs.version.outputs.version }}" > version.txt
          pyinstaller --onefile --name ocbrain \
            --add-data "config:config" \
            --add-data "interface/web:interface/web" main.py
          python install/build.py macos
          pkgbuild --root dist/ocbrain-macos \
            --identifier io.ocbrain \
            --version ${{ needs.version.outputs.version }} \
            --install-location / \
            dist/ocbrain-${{ needs.version.outputs.version }}.pkg || true
      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/ocbrain
            dist/ocbrain-*.pkg

  publish-pip:
    needs: [version, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Build and publish to PyPI
        run: |
          echo "${{ needs.version.outputs.version }}" > version.txt
          pip install build twine --quiet
          python -m build
          # Uncomment when PyPI token is set:
          # twine upload dist/* --username __token__ --password ${{ secrets.PYPI_TOKEN }}
        continue-on-error: true

  update-apt-repo:
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: 'gh-pages', path: 'gh-pages' }
      - uses: actions/download-artifact@v4
        with: { name: linux-artifacts, path: artifacts }
      - name: Update apt repo
        run: |
          mkdir -p gh-pages/apt/pool/main
          cp artifacts/*.deb gh-pages/apt/pool/main/ 2>/dev/null || true
          cd gh-pages/apt
          apt-ftparchive packages pool/main > Packages 2>/dev/null || true
          gzip -k Packages 2>/dev/null || true
          apt-ftparchive release . > Release 2>/dev/null || true
          cd ../..
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update apt repo for ${{ github.ref_name }}"
          git push || true

  release:
    needs: [version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: release-assets, merge-multiple: true }
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OCBrain ${{ github.ref_name }}"
          generate_release_notes: true
          files: release-assets/**/*
          body: |
            ## Install

            **One-liner:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            **pip:**
            ```bash
            pip install git+https://github.com/${{ github.repository }}.git@${{ github.ref_name }}
            ```

            **Direct download:** See assets below.
