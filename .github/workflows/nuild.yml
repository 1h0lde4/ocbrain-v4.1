name: Build Deliverables

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build package
        run: |
          mkdir dist
          zip -r dist/project.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deliverables
          path: dist/
          
